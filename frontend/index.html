<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Spice Heaven - Zomato Clone</title>
    <!-- Fonts and Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Styling enforcing Zomato Red (#E23744) -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#E23744', 
                        'primary-container': '#fceae9',
                        surface: '#fcf9f8',
                        'on-surface': '#1b1b1b',
                        background: '#fcf9f8',
                        'surface-container-low': '#f6f3f2',
                        'surface-container-lowest': '#ffffff',
                    },
                    fontFamily: {
                        headline: ["Inter", "sans-serif"],
                        body: ["Inter", "sans-serif"],
                        label: ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            /* Desktop backdrop Simulator */
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        #mobile-container {
            width: 375px;
            height: 812px;
            background-color: #ffffff;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            border: 8px solid #333; /* Simulated phone bezel */
            transform: translateZ(0); /* Create new stacking context */
        }

        /* Scrollable area inside the phone */
        .app-view {
            overflow-y: auto;
            overflow-x: hidden;
            height: 100%;
            width: 100%;
            display: none; /* hidden by default */
            padding-bottom: 120px;
            /* Hide scrollbars for Mobile feel */
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none;  /* IE and Edge */
        }

        .app-view::-webkit-scrollbar {
            display: none; /* Chrome, Safari and Opera */
        }

        /* Root scrollbar removal */
        * {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        *::-webkit-scrollbar {
            display: none;
        }

        .app-view.active {
            display: block;
        }

        /* Utilities */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-panel { background: rgba(252, 249, 248, 0.9); backdrop-filter: blur(12px); }
        .veg-icon { border: 1px solid #006762; width: 14px; height: 14px; display: flex; align-items: center; justify-content: center; }
        .veg-dot { width: 6px; height: 6px; background-color: #006762; border-radius: 50%; }
        
        /* Loading Skeleton Animation */
        @keyframes shimmer {
            0% { background-position: -468px 0; }
            100% { background-position: 468px 0; }
        }
        .skeleton {
            background: #f6f7f8;
            background-image: linear-gradient(to right, #f6f7f8 0%, #edeef1 20%, #f6f7f8 40%, #f6f7f8 100%);
            background-repeat: no-repeat;
            background-size: 300px 100%; 
            animation-duration: 1.5s;
            animation-fill-mode: forwards; 
            animation-iteration-count: infinite;
            animation-name: shimmer;
            animation-timing-function: linear;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div id="mobile-container">
    
    <!-- ========================================== -->
    <!-- VIEW 1: HOME PAGE                          -->
    <!-- ========================================== -->
    <div id="view-home" class="app-view active"></div>

    <!-- ========================================== -->
    <!-- VIEW 2: RESTAURANT MENU                    -->
    <!-- ========================================== -->
    <div id="view-menu" class="app-view relative"></div>

    <!-- ========================================== -->
    <!-- VIEW 3: SMART CART & CHECKOUT              -->
    <!-- ========================================== -->
    <div id="view-cart" class="app-view"></div>

    </div>

    <!-- Toast Notification (Hidden by default) -->
    <div id="simulator-toast" class="fixed top-10 left-1/2 -translate-x-1/2 bg-gray-900 border border-gray-700 text-green-400 font-bold px-4 py-2 rounded-full shadow-2xl z-[100] text-xs uppercase tracking-widest opacity-0 transform -translate-y-4 transition-all duration-300 flex items-center gap-2 pointer-events-none">
        <span class="material-symbols-outlined text-[16px]">check_circle</span>
        <span>Persona Applied • AI Refreshed</span>
    </div>

    <!-- Simulator FAB (Floating Action Button) -->
    <button id="simulator-fab" onclick="toggleSimulator()" class="fixed bottom-24 right-4 z-[60] bg-gray-900 text-white p-3 rounded-full shadow-[0_8px_30px_rgba(0,0,0,0.5)] border border-gray-700 active:scale-90 transition-transform flex items-center justify-center">
        <span class="material-symbols-outlined text-[24px]">tune</span>
    </button>

    <!-- Simulator Panel (Slide-up Bottom Sheet) -->
    <div id="simulator-panel" class="absolute bottom-0 left-0 right-0 max-h-[90%] overflow-y-auto bg-gray-950/95 backdrop-blur-xl border-t border-gray-800 rounded-t-[32px] p-6 z-[70] transform translate-y-full transition-transform duration-300 shadow-[0_-20px_50px_rgba(0,0,0,0.5)]">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-white font-headline font-bold text-lg flex items-center gap-2">
                <span class="material-symbols-outlined text-purple-400">smart_toy</span>
                Persona Simulator
            </h2>
            <button onclick="toggleSimulator()" class="text-gray-400 hover:text-white bg-gray-800 p-1.5 rounded-full transition-colors flex items-center justify-center">
                <span class="material-symbols-outlined text-[18px]">close</span>
            </button>
        </div>

        <div class="space-y-5 pb-6">
            <!-- Preset Selector -->
            <div>
                <label class="text-gray-400 text-xs font-bold uppercase tracking-widest mb-2 block">Behavior Preset</label>
                <select id="sim-preset-select" class="w-full bg-gray-900 border border-gray-700 text-white rounded-xl py-3 px-4 focus:ring-2 focus:ring-purple-500 outline-none appearance-none font-medium cursor-pointer">
                    <option value="The Health Nut">The Health Nut</option>
                    <option value="The Budget Student">The Budget Student</option>
                    <option value="The Family/Bulk Orderer">The Family/Bulk Orderer</option>
                    <option value="The Brand New User">The Brand New User</option>
                </select>
            </div>

            <!-- Sliders -->
            <div class="bg-gray-900/50 p-4 rounded-xl border border-gray-800 space-y-4">
                <div>
                    <div class="flex justify-between text-xs text-gray-400 mb-2">
                        <span>Avg Order Value (AOV)</span>
                        <span id="sim-aov-display" class="font-bold text-white font-mono">₹500</span>
                    </div>
                    <input type="range" id="sim-aov-slider" min="0" max="2000" step="50" value="500" class="w-full h-1 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-purple-500">
                </div>

                <div>
                    <div class="flex justify-between text-xs text-gray-400 mb-2">
                        <span>Past Order Count</span>
                        <span id="sim-order-display" class="font-bold text-white font-mono">15</span>
                    </div>
                    <input type="range" id="sim-order-slider" min="0" max="50" step="1" value="15" class="w-full h-1 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-purple-500">
                </div>
            </div>

            <!-- Action Button -->
            <button onclick="applyPersona()" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold tracking-wide py-4 rounded-xl shadow-[0_0_20px_rgba(147,51,234,0.4)] transition-all active:scale-[0.98] mt-2">
                Inject Persona Vector
            </button>
        </div>
    </div>

</div>

<!-- The SPA Logic Engine -->
<script src="/static/app.js"></script>

</body>
</html>
