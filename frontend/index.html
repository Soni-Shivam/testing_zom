<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Spice Heaven - Zomato Clone</title>
    <!-- Fonts and Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Styling enforcing Zomato Red (#E23744) -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#E23744', 
                        'primary-container': '#fceae9',
                        surface: '#fcf9f8',
                        'on-surface': '#1b1b1b',
                        background: '#fcf9f8',
                        'surface-container-low': '#f6f3f2',
                        'surface-container-lowest': '#ffffff',
                    },
                    fontFamily: {
                        headline: ["Inter", "sans-serif"],
                        body: ["Inter", "sans-serif"],
                        label: ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            /* Desktop backdrop Simulator */
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        #mobile-container {
            width: 375px;
            height: 812px;
            background-color: #ffffff;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            border: 8px solid #333; /* Simulated phone bezel */
            transform: translateZ(0); /* Create new stacking context */
        }

        /* Scrollable area inside the phone */
        .app-view {
            overflow-y: auto;
            overflow-x: hidden;
            height: 100%;
            width: 100%;
            display: none; /* hidden by default */
            padding-bottom: 120px;
            /* Hide scrollbars for Mobile feel */
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none;  /* IE and Edge */
        }

        .app-view::-webkit-scrollbar {
            display: none; /* Chrome, Safari and Opera */
        }

        /* Root scrollbar removal */
        * {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        *::-webkit-scrollbar {
            display: none;
        }

        .app-view.active {
            display: block;
        }

        /* Utilities */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-panel { background: rgba(252, 249, 248, 0.9); backdrop-filter: blur(12px); }
        .veg-icon { border: 1px solid #006762; width: 14px; height: 14px; display: flex; align-items: center; justify-content: center; }
        .veg-dot { width: 6px; height: 6px; background-color: #006762; border-radius: 50%; }
        
        /* Loading Skeleton Animation */
        @keyframes shimmer {
            0% { background-position: -468px 0; }
            100% { background-position: 468px 0; }
        }
        .skeleton {
            background: #f6f7f8;
            background-image: linear-gradient(to right, #f6f7f8 0%, #edeef1 20%, #f6f7f8 40%, #f6f7f8 100%);
            background-repeat: no-repeat;
            background-size: 300px 100%; 
            animation-duration: 1.5s;
            animation-fill-mode: forwards; 
            animation-iteration-count: infinite;
            animation-name: shimmer;
            animation-timing-function: linear;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div id="mobile-container">
    
    <!-- ========================================== -->
    <!-- VIEW 1: HOME PAGE                          -->
    <!-- ========================================== -->
    <div id="view-home" class="app-view active"></div>

    <!-- ========================================== -->
    <!-- VIEW 2: RESTAURANT MENU                    -->
    <!-- ========================================== -->
    <div id="view-menu" class="app-view relative"></div>

    <!-- ========================================== -->
    <!-- VIEW 3: SMART CART & CHECKOUT              -->
    <!-- ========================================== -->
    <div id="view-cart" class="app-view"></div>

</div>

<!-- The SPA Logic Engine -->
<script src="/static/app.js"></script>

</body>
</html>
